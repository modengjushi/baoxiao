const cityList = Object.entries(cityData).map(([code, info]) => ({ code, name: info.name }));
const now = new Date();
const currentMonth = now.getMonth() + 1;
let selectedCityCode = null;

const searchInput = document.getElementById('citySearch');
const dropdown = document.getElementById('cityDropdown');
const monthSelect = document.getElementById('monthSelect');

monthSelect.value = currentMonth;

searchInput.addEventListener('input', function () {
    const keyword = this.value.trim();
    if (!keyword) { dropdown.style.display = 'none'; selectedCityCode = null; return; }
    const filtered = cityList.filter(c => c.name.includes(keyword));
    dropdown.innerHTML = '';
    if (filtered.length === 0) {
        const noResult = document.createElement('div');
        noResult.className = 'city-item';
        noResult.textContent = '未找到匹配城市，请尝试其他关键词';
        noResult.style.color = '#999';
        noResult.style.cursor = 'default';
        dropdown.appendChild(noResult);
        dropdown.style.display = 'block';
        return;
    }
    filtered.forEach(c => {
        const div = document.createElement('div');
        div.className = 'city-item';
        div.textContent = c.name;
        div.onclick = () => {
            searchInput.value = c.name;
            selectedCityCode = c.code;
            dropdown.style.display = 'none';
        };
        dropdown.appendChild(div);
    });
    dropdown.style.display = 'block';
});

document.addEventListener('click', function (e) {
    if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
});

function search() {
    const resBox = document.getElementById('result');
    if (!selectedCityCode) {
        resBox.className = 'result show';
        resBox.innerHTML = '⚠️ 请先搜索并选择城市';
        return;
    }

    const data = cityData[selectedCityCode];
    if (!data) {
        resBox.className = 'result show';
        resBox.innerHTML = '⚠️ 城市数据不存在，请重新选择';
        return;
    }

    const queryMonth = parseInt(monthSelect.value);
    if (isNaN(queryMonth) || queryMonth < 1 || queryMonth > 12) {
        resBox.className = 'result show';
        resBox.innerHTML = '⚠️ 请选择有效的月份';
        return;
    }

    const monthText = `${queryMonth}月`;
    let html = '';

    if (!data.peak) {
        resBox.className = 'result show normal';
        html = `<strong>🏙️ ${data.name}</strong><br><strong>📅 查询月份：${monthText}</strong><br>住宿费标准：<strong>${data.base} 元/人·天</strong><br>无旺季浮动`;
    } else {
        const isPeak = data.peakMonths.includes(queryMonth);
        if (isPeak) {
            resBox.className = 'result show peak';
            html = `<strong>🏙️ ${data.name}</strong><br><strong>📅 查询月份：${monthText}</strong><br>基础标准：${data.base} 元<br>📅 当前为<strong>旺季</strong>，执行：<strong>${data.peakPrice} 元/人·天</strong>`;
        } else {
            resBox.className = 'result show normal';
            html = `<strong>🏙️ ${data.name}</strong><br><strong>📅 查询月份：${queryMonth}月</strong><br>当前非旺季<br>执行标准：<strong>${data.base} 元/人·天</strong>`;
        }
    }
    resBox.innerHTML = html;
}
